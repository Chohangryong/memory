<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>MyAutomation Console</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --surface: #ffffff;
        --surface-soft: #f2f4f7;
        --ink: #101318;
        --muted: #667085;
        --faint: #98a2b3;
        --line: #e4e7ec;
        --accent: #2563eb;
        --accent-strong: #1d4ed8;
        --accent-soft: #eff6ff;
        --danger: #b42318;
        --warn: #b54708;
        --ok: #067647;
        --shadow: 0 18px 48px rgba(16, 24, 40, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
        font-size: 14px;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:focus-visible,
      input:focus-visible {
        outline: 3px solid rgba(37, 99, 235, 0.22);
        outline-offset: 2px;
      }

      .shell {
        display: grid;
        grid-template-columns: 236px minmax(0, 1fr) 372px;
        gap: 14px;
        min-height: 100vh;
        padding: 14px;
      }

      .sidebar,
      .panel,
      .detail {
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: var(--shadow);
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        padding: 16px;
      }

      .brand {
        border-bottom: 1px solid var(--line);
        padding-bottom: 16px;
      }

      .brand h1 {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
        font-size: 23px;
        font-weight: 760;
        letter-spacing: -0.02em;
      }

      .eyebrow,
      .meta,
      .muted {
        color: var(--muted);
      }

      .eyebrow {
        margin-bottom: 8px;
        color: var(--accent);
        font-size: 11px;
        font-weight: 780;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .nav {
        display: grid;
        gap: 6px;
        margin-top: 18px;
      }

      .nav button,
      .tab,
      .ghost,
      .primary {
        border: 1px solid transparent;
        border-radius: 10px;
        min-height: 36px;
        transition: background 160ms ease, border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
      }

      .nav button {
        display: grid;
        grid-template-columns: 24px 1fr auto;
        align-items: center;
        width: 100%;
        background: transparent;
        color: var(--muted);
        padding: 0 9px;
        text-align: left;
      }

      .nav button:hover,
      .nav button.active {
        background: #f9fafb;
        color: var(--ink);
        border-color: var(--line);
      }

      .nav button.active {
        box-shadow: inset 3px 0 0 var(--accent);
      }

      .nav .count {
        color: var(--faint);
        font-size: 12px;
      }

      .token-card {
        margin-top: auto;
        padding-top: 16px;
        border-top: 1px solid var(--line);
      }

      .token-form {
        display: grid;
        gap: 8px;
      }

      input {
        width: 100%;
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #ffffff;
        color: var(--ink);
        padding: 0 10px;
      }

      .primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
        padding: 0 12px;
      }

      .primary:hover {
        background: var(--accent-strong);
      }

      .ghost {
        background: var(--surface);
        border-color: var(--line);
        color: var(--ink);
        padding: 0 12px;
      }

      .primary:hover,
      .ghost:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 18px rgba(16, 24, 40, 0.08);
      }

      .panel {
        min-width: 0;
        padding: 16px;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: end;
        border-bottom: 1px solid var(--line);
        padding-bottom: 14px;
      }

      h2 {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
        font-size: 28px;
        font-weight: 760;
        letter-spacing: -0.03em;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin: 14px 0;
      }

      .metric {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fcfcfd;
        padding: 12px;
      }

      .metric strong {
        display: block;
        font-size: 24px;
        font-weight: 760;
        line-height: 1.05;
      }

      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }

      .tab {
        background: #ffffff;
        border-color: var(--line);
        color: var(--muted);
        padding: 0 11px;
      }

      .tab:hover,
      .tab.active {
        background: var(--accent-soft);
        color: var(--accent);
        border-color: rgba(15, 111, 99, 0.25);
      }

      .run-list {
        display: grid;
        gap: 7px;
      }

      .run-row {
        display: grid;
        grid-template-columns: 104px minmax(0, 1fr) 136px;
        gap: 12px;
        align-items: start;
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #ffffff;
        color: var(--ink);
        padding: 12px;
        text-align: left;
      }

      .run-row:hover,
      .run-row.active {
        border-color: rgba(37, 99, 235, 0.35);
        background: #fbfdff;
        box-shadow: 0 10px 28px rgba(16, 24, 40, 0.08);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        min-height: 22px;
        border-radius: 999px;
        padding: 3px 8px;
        background: #f2f4f7;
        color: var(--muted);
        font-size: 11px;
        font-weight: 720;
      }

      .badge.created,
      .badge.update_executed,
      .badge.delete_executed {
        background: #dff1e6;
        color: var(--ok);
      }

      .badge.duplicate,
      .badge.not_executed {
        background: #fff0c2;
        color: var(--warn);
      }

      .badge.calendar_error {
        background: #fee4dc;
        color: var(--danger);
      }

      .request {
        margin: 0 0 6px;
        overflow-wrap: anywhere;
        font-weight: 650;
        line-height: 1.35;
      }

      .message {
        margin: 0;
        color: var(--muted);
        white-space: pre-wrap;
        font-size: 13px;
        line-height: 1.45;
      }

      .event-chip {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--muted);
        font-size: 13px;
      }

      .detail {
        position: sticky;
        top: 14px;
        height: calc(100vh - 28px);
        overflow: auto;
        padding: 16px;
      }

      .detail h3 {
        margin: 0 0 8px;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
        font-size: 22px;
        font-weight: 740;
        letter-spacing: -0.02em;
      }

      .action-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin: 16px 0;
      }

      .action-grid button {
        height: 38px;
      }

      .action-grid button:disabled {
        cursor: not-allowed;
        opacity: 0.48;
        transform: none;
      }

      .section {
        border-top: 1px solid var(--line);
        padding-top: 13px;
        margin-top: 13px;
      }

      .kv {
        display: grid;
        gap: 8px;
      }

      .kv div {
        display: grid;
        grid-template-columns: 96px 1fr;
        gap: 10px;
        font-size: 13px;
      }

      .kv span:first-child {
        color: var(--muted);
      }

      .empty {
        padding: 32px;
        text-align: center;
        color: var(--muted);
        background: #ffffff;
        border: 1px dashed var(--line);
        border-radius: 12px;
      }

      @media (max-width: 1100px) {
        .shell {
          grid-template-columns: 210px minmax(0, 1fr);
        }

        .detail {
          position: static;
          grid-column: 1 / -1;
          height: auto;
        }
      }

      @media (max-width: 760px) {
        .shell {
          grid-template-columns: 1fr;
          padding: 10px;
        }

        .topbar,
        .metrics,
        .run-row {
          grid-template-columns: 1fr;
        }

        .toolbar,
        .action-grid {
          grid-template-columns: 1fr;
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="eyebrow">Automation OS</div>
          <h1>MyAutomation</h1>
          <div class="muted">Personal control plane</div>
        </div>
        <nav class="nav" aria-label="자동화 메뉴">
          <button class="active" type="button" data-automation="schedule"><span>S</span><strong>Schedule</strong><span class="count" id="scheduleCount">0</span></button>
          <button type="button" data-automation="discord"><span>D</span><strong>Discord</strong><span class="count">soon</span></button>
          <button type="button" data-automation="voice"><span>V</span><strong>Voice</strong><span class="count">soon</span></button>
          <button type="button" data-automation="settings"><span>C</span><strong>Settings</strong><span class="count">local</span></button>
        </nav>
        <div class="token-card">
          <form class="token-form" id="tokenForm">
            <input name="username" type="text" autocomplete="username" value="myautomation" hidden />
            <label class="muted" for="token">API token</label>
            <input id="token" name="token" type="password" autocomplete="current-password" />
            <button class="primary" type="submit">저장하고 새로고침</button>
          </form>
        </div>
      </aside>

      <section class="panel">
        <div class="topbar">
          <div>
            <div class="eyebrow">Schedule Automation</div>
            <h2>Run History</h2>
            <div class="muted">iPhone Shortcut, LLM parsing, Google Calendar execution</div>
          </div>
          <div class="toolbar">
            <input id="search" type="search" placeholder="요청 검색" autocomplete="off" />
            <button id="refresh" class="ghost" type="button">새로고침</button>
          </div>
        </div>

        <section class="metrics" id="summary"></section>
        <section class="tabs" id="tabs"></section>
        <section class="run-list" id="runs"></section>
      </section>

      <aside class="detail" id="detail"></aside>
    </main>

    <script>
      const tokenInput = document.querySelector("#token");
      const tokenForm = document.querySelector("#tokenForm");
      const searchInput = document.querySelector("#search");
      const runsEl = document.querySelector("#runs");
      const tabsEl = document.querySelector("#tabs");
      const summaryEl = document.querySelector("#summary");
      const detailEl = document.querySelector("#detail");
      const scheduleCount = document.querySelector("#scheduleCount");
      const state = { runs: [], selectedId: null, filter: "all", query: "" };
      const savedToken = localStorage.getItem("myautomation.token") || "";
      tokenInput.value = savedToken;

      const filters = [
        ["all", "전체"],
        ["created", "생성"],
        ["update_executed", "수정"],
        ["delete_executed", "삭제"],
        ["not_executed", "미실행"],
        ["duplicate", "중복"],
        ["calendar_error", "오류"],
      ];

      tokenForm.addEventListener("submit", (event) => {
        event.preventDefault();
        localStorage.setItem("myautomation.token", tokenInput.value.trim());
        loadRuns();
      });
      document.querySelector("#refresh").addEventListener("click", loadRuns);
      searchInput.addEventListener("input", () => {
        state.query = searchInput.value.trim().toLowerCase();
        render();
      });

      function statusLabel(status) {
        const labels = {
          created: "생성",
          update_executed: "수정",
          delete_executed: "삭제",
          duplicate: "중복",
          not_executed: "미실행",
          calendar_error: "오류",
          dry_run: "후보",
        };
        return labels[status] || status;
      }

      function canRetry(run) {
        return ["not_executed", "calendar_error"].includes(run.status);
      }

      function formatDate(value) {
        if (!value) return "";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return new Intl.DateTimeFormat("ko-KR", {
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        }).format(date);
      }

      function filteredRuns() {
        return state.runs.filter((run) => {
          const byStatus = state.filter === "all" || run.status === state.filter;
          const haystack = `${run.input_text} ${run.result_message || ""}`.toLowerCase();
          const byQuery = !state.query || haystack.includes(state.query);
          return byStatus && byQuery;
        });
      }

      function renderSummary() {
        const counts = state.runs.reduce((acc, run) => {
          acc[run.status] = (acc[run.status] || 0) + 1;
          return acc;
        }, {});
        const metrics = [
          ["전체", state.runs.length],
          ["성공", (counts.created || 0) + (counts.update_executed || 0) + (counts.delete_executed || 0)],
          ["재처리 가능", (counts.not_executed || 0) + (counts.calendar_error || 0)],
          ["중복", counts.duplicate || 0],
        ];
        summaryEl.innerHTML = metrics
          .map(([label, value]) => `<article class="metric"><strong>${value}</strong><span class="muted">${label}</span></article>`)
          .join("");
        scheduleCount.textContent = String(state.runs.length);
      }

      function renderTabs() {
        tabsEl.innerHTML = filters
          .map(([key, label]) => `<button class="tab ${state.filter === key ? "active" : ""}" type="button" data-filter="${key}">${label}</button>`)
          .join("");
        tabsEl.querySelectorAll("button").forEach((button) => {
          button.addEventListener("click", () => {
            state.filter = button.dataset.filter;
            render();
          });
        });
      }

      function renderRuns() {
        const runs = filteredRuns();
        if (!runs.length) {
          runsEl.innerHTML = `<div class="empty">표시할 실행 기록이 없습니다.</div>`;
          return;
        }
        if (!runs.some((run) => run.id === state.selectedId)) {
          state.selectedId = runs[0].id;
        }
        runsEl.innerHTML = runs
          .map((run) => {
            const firstEvent = run.schedule_events[0];
            const eventLabel = firstEvent ? `${firstEvent.title} ${firstEvent.start_at || ""}` : "이벤트 없음";
            return `
              <button class="run-row ${run.id === state.selectedId ? "active" : ""}" type="button" data-run-id="${run.id}">
                <div>
                  <span class="badge ${run.status}">${statusLabel(run.status)}</span>
                  <div class="meta" style="margin-top:8px">${formatDate(run.started_at)}</div>
                </div>
                <div>
                  <p class="request">${escapeHtml(run.input_text)}</p>
                  <p class="message">${escapeHtml((run.result_message || "").split("\\n")[0])}</p>
                </div>
                <div class="event-chip">${escapeHtml(eventLabel)}</div>
              </button>
            `;
          })
          .join("");
        runsEl.querySelectorAll("button").forEach((button) => {
          button.addEventListener("click", () => {
            state.selectedId = button.dataset.runId;
            render();
          });
        });
      }

      function renderDetail() {
        const run = state.runs.find((item) => item.id === state.selectedId);
        if (!run) {
          detailEl.innerHTML = `<div class="empty">실행 기록을 선택하세요.</div>`;
          return;
        }
        const events = run.schedule_events
          .map((event) => {
            const googleButton = event.google_event_id
              ? `<button class="ghost" type="button" data-google-date="${escapeHtml(event.start_at || "")}">Google 열기</button>`
              : `<button class="ghost" type="button" disabled>Google 없음</button>`;
            return `
              <div class="section">
                <div class="kv">
                  <div><span>제목</span><strong>${escapeHtml(event.title)}</strong></div>
                  <div><span>상태</span><span>${escapeHtml(event.status)}</span></div>
                  <div><span>시작</span><span>${escapeHtml(event.start_at || "-")}</span></div>
                  <div><span>종료</span><span>${escapeHtml(event.end_at || "-")}</span></div>
                  <div><span>Google ID</span><span>${escapeHtml(event.google_event_id || "-")}</span></div>
                </div>
                <div class="action-grid">${googleButton}</div>
              </div>
            `;
          })
          .join("");
        detailEl.innerHTML = `
          <div class="eyebrow">Run Detail</div>
          <h3>${escapeHtml(run.input_text)}</h3>
          <span class="badge ${run.status}">${statusLabel(run.status)}</span>
          <div class="action-grid">
            <button class="primary" id="retry" type="button" ${canRetry(run) ? "" : "disabled"}>재처리</button>
            <button class="ghost" id="copy" type="button">원문 복사</button>
          </div>
          <div class="section">
            <p class="message">${escapeHtml(run.result_message || "메시지 없음")}</p>
          </div>
          <div class="section kv">
            <div><span>Run ID</span><span>${escapeHtml(run.id)}</span></div>
            <div><span>Source</span><span>${escapeHtml(run.source)}</span></div>
            <div><span>Started</span><span>${escapeHtml(formatDate(run.started_at))}</span></div>
          </div>
          ${events || `<div class="section muted">연결된 일정 이벤트가 없습니다.</div>`}
        `;
        detailEl.querySelector("#copy").addEventListener("click", () => navigator.clipboard.writeText(run.input_text));
        detailEl.querySelector("#retry").addEventListener("click", () => retryRun(run));
        detailEl.querySelectorAll("[data-google-date]").forEach((button) => {
          button.addEventListener("click", () => openGoogleCalendar(button.dataset.googleDate));
        });
      }

      function render() {
        renderSummary();
        renderTabs();
        renderRuns();
        renderDetail();
      }

      async function loadRuns() {
        const token = tokenInput.value.trim();
        if (!token) {
          summaryEl.innerHTML = "";
          tabsEl.innerHTML = "";
          runsEl.innerHTML = `<div class="empty">API token을 입력하면 최근 요청을 불러옵니다.</div>`;
          detailEl.innerHTML = `<div class="empty">토큰 저장 후 실행 기록을 선택할 수 있습니다.</div>`;
          return;
        }
        const response = await fetch("/api/runs?limit=80", {
          headers: { "X-MyAutomation-Token": token },
        });
        if (!response.ok) {
          runsEl.innerHTML = `<div class="empty">불러오지 못했습니다. 토큰을 확인해 주세요.</div>`;
          return;
        }
        const data = await response.json();
        state.runs = data.runs || [];
        if (!state.selectedId && state.runs[0]) state.selectedId = state.runs[0].id;
        render();
      }

      async function retryRun(run) {
        if (!canRetry(run)) return;
        const confirmed = confirm("이 요청을 다시 처리할까요? Google Calendar 쓰기가 켜져 있으면 실제 실행될 수 있습니다.");
        if (!confirmed) return;
        const response = await fetch(`/api/runs/${encodeURIComponent(run.id)}/retry`, {
          method: "POST",
          headers: { "X-MyAutomation-Token": tokenInput.value.trim() },
        });
        const body = await response.json();
        alert(body.message || body.status);
        await loadRuns();
      }

      function openGoogleCalendar(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          window.open("https://calendar.google.com/calendar/u/0/r", "_blank", "noopener");
          return;
        }
        const url = `https://calendar.google.com/calendar/u/0/r/day/${date.getFullYear()}/${date.getMonth() + 1}/${date.getDate()}`;
        window.open(url, "_blank", "noopener");
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      loadRuns();
    </script>
  </body>
</html>
